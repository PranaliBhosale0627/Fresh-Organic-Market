services:
  - type: web
    name: verdant-harvest-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: verdant_harvest
      - key: CORS_ORIGIN
        sync: false
